<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CD4 Perturb-seq Regulator Atlas</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#12161f; --panel2:#161b26; --panel3:#1b2130;
    --line:#232b3a; --line2:#313c50; --text:#e7ecf3; --muted:#8b95a8; --faint:#5d6779;
    --accent:#22b8c4; --accent-dim:rgba(34,184,196,.14);
    --amber:#e0a441; --violet:#9585e0; --up:#f0645a; --down:#4f86ea;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --sans:-apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;
    background-image:radial-gradient(1000px 500px at 85% -10%,var(--accent-dim),transparent 60%)}
  a{color:var(--accent)}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 20px 70px}
  header{display:flex;flex-wrap:wrap;align-items:center;gap:12px 18px;border-bottom:1px solid var(--line);padding-bottom:18px}
  h1{font-size:22px;font-weight:680;letter-spacing:-.02em;margin:0}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .conn{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .conn input{background:var(--panel2);border:1px solid var(--line2);color:var(--text);border-radius:7px;padding:5px 8px;font-family:var(--mono);font-size:12px;width:180px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--faint)}
  .dot.ok{background:#38c172}.dot.bad{background:var(--up)}
  .tabs{display:flex;gap:6px;margin:20px 0 18px;flex-wrap:wrap}
  .tab{font-family:var(--mono);font-size:13px;padding:8px 14px;border-radius:9px;cursor:pointer;background:transparent;border:1px solid var(--line2);color:var(--muted)}
  .tab[aria-selected=true]{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  .hide{display:none}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .card{background:var(--panel);padding:14px 16px}
  .card .n{font-family:var(--mono);font-size:22px;font-weight:600}
  .card .k{font-size:12px;color:var(--muted);margin-top:2px}
  .panel{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:16px}
  .sec{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:0 0 12px;display:flex;align-items:center;gap:10px}
  .sec::after{content:"";flex:1;height:1px;background:var(--line)}
  .search{display:flex;gap:8px;margin-bottom:6px}
  .search input{flex:1;background:var(--panel2);border:1px solid var(--line2);color:var(--text);border-radius:9px;padding:11px 14px;font-family:var(--mono);font-size:15px}
  .search button,.filters button{background:var(--accent);color:#04252a;border:0;border-radius:9px;padding:0 16px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .filters select{background:var(--panel2);border:1px solid var(--line2);color:var(--text);border-radius:8px;padding:7px 10px;font-family:var(--mono);font-size:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);text-align:left;padding:7px 8px;border-bottom:1px solid var(--line2)}
  td{padding:7px 8px;border-bottom:1px solid var(--line);font-family:var(--mono)}
  tr:last-child td{border-bottom:0}
  tbody tr{cursor:pointer}
  tbody tr:hover td{background:var(--panel3)}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .gn{color:var(--text);font-weight:600}
  .cls{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px}
  .cls.global{background:var(--accent-dim);color:var(--accent)}
  .cls.cs{background:rgba(149,133,224,.16);color:var(--violet)}
  .chip{font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:20px;background:var(--panel3);border:1px solid var(--line);color:var(--muted)}
  .stt{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
  .stt.dem{background:rgba(240,100,90,.16);color:var(--up)} .stt.pro{background:var(--accent-dim);color:var(--accent)} .stt.sur{background:rgba(56,193,114,.16);color:#38c172}
  .prof-head{display:flex;flex-wrap:wrap;align-items:baseline;gap:12px}
  .prof-head h2{font-family:var(--mono);font-size:26px;margin:0}
  .prof-head .rk{font-family:var(--mono);color:var(--accent);font-size:14px}
  .interp{color:var(--muted);font-size:13.5px;margin:8px 0 0}
  .kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px}
  .kv .b{background:var(--panel3);border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .kv .b .v{font-family:var(--mono);font-size:16px;font-weight:600}
  .kv .b .l{font-size:11px;color:var(--muted)}
  .barrow{display:grid;grid-template-columns:70px 1fr auto;align-items:center;gap:10px;margin:6px 0;font-family:var(--mono);font-size:12px}
  .track{height:14px;background:var(--panel3);border-radius:5px;overflow:hidden}
  .fill{height:100%;background:var(--accent);border-radius:5px}
  .muted{color:var(--muted)} .err{color:var(--up);font-family:var(--mono);font-size:13px}
  .up{color:var(--up)} .down{color:var(--down)}
  .lead{color:var(--muted);font-size:13.5px;margin:0 0 4px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow">Read-only atlas</div>
      <h1>CD4 Perturb-seq Regulator Atlas</h1>
    </div>
    <div class="conn">
      <span class="dot" id="dot"></span>
      <span id="conntxt">connecting…</span>
      <input id="apibase" value="http://localhost:8000" title="API URL">
    </div>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab" data-view="overview" aria-selected="true">Overview</button>
    <button class="tab" data-view="explorer">Explore regulators</button>
    <button class="tab" data-view="audit">Audit</button>
    <button class="tab" data-view="edges">Effect network</button>
    <button class="tab" data-view="programs">Programs</button>
    <button class="tab" data-view="classes">Programs by class</button>
  </div>

  <section id="v-overview"></section>
  <section id="v-explorer" class="hide"></section>
  <section id="v-audit" class="hide"></section>
  <section id="v-edges" class="hide"></section>
  <section id="v-programs" class="hide"></section>
  <section id="v-classes" class="hide"></section>
</div>

<script>
const $=s=>document.querySelector(s);
const _qp=new URLSearchParams(location.search).get("api");
// if the UI is served by the API itself (http://…), use that same origin (no CORS)
const _sameOrigin=location.protocol.startsWith("http")?location.origin:null;
let API=_qp||_sameOrigin||localStorage.getItem("atlas_api")||"http://localhost:8000";
if(_qp)localStorage.setItem("atlas_api",_qp);
$("#apibase").value=API;
const fmt=n=>n==null?"—":(typeof n==="number"?(Number.isInteger(n)?n.toLocaleString():n.toFixed(2)):n);
const pct=n=>n==null?"—":(n*100).toFixed(0)+"%";
// correlation cell: if metadata is missing, show "—" with a tooltip
const corr=n=>n==null?`<span class="muted" title="no cross-guide/donor metadata → neutral weight">—</span>`:n.toFixed(2);
async function api(path){const r=await fetch(API+path);if(!r.ok)throw new Error(r.status+" "+path);return r.json();}

// ---- fuzzy matching de genes ----
let GENES=null;
async function loadGenes(){ if(GENES)return GENES; try{GENES=await api("/genes");}catch(e){GENES=[];} return GENES; }
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  let p=Array.from({length:n+1},(_,i)=>i);
  for(let i=1;i<=m;i++){let prev=p[0];p[0]=i;
    for(let j=1;j<=n;j++){const t=p[j];p[j]=Math.min(p[j]+1,p[j-1]+1,prev+(a[i-1]===b[j-1]?0:1));prev=t;}}
  return p[n];}
function suggest(q){const genes=GENES||[];const qu=q.toUpperCase();
  return genes.map(g=>[g,g.includes(qu)?0.5:lev(qu,g)]).filter(x=>x[1]<=Math.max(2,Math.floor(q.length/3)+1))
    .sort((a,b)=>a[1]-b[1]).slice(0,5).map(x=>x[0]);}

let SUMMARY=null;
async function connect(){
  try{ const h=await api("/health"); SUMMARY=await api("/summary");
    $("#dot").className="dot ok"; $("#conntxt").textContent=`ok · ${h.n_regulators.toLocaleString()} regulators`;
    render(current);
  }catch(e){ $("#dot").className="dot bad"; $("#conntxt").textContent="API unavailable";
    $("#v-"+current).innerHTML=`<div class="panel err">Couldn't connect to <b>${API}</b>.<br>Start the API: <span class="muted">uvicorn api.main:app --port 8000</span></div>`; }
}
$("#apibase").addEventListener("change",e=>{API=e.target.value.replace(/\/$/,"");localStorage.setItem("atlas_api",API);connect();});

/* tabs */
let current="overview";
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  current=t.dataset.view;
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected",x===t));
  document.querySelectorAll("section[id^=v-]").forEach(s=>s.classList.toggle("hide",s.id!=="v-"+current));
  render(current);
}));
function render(v){ if(!SUMMARY)return; ({overview:renderOverview,explorer:renderExplorer,audit:renderAudit,edges:renderEdges,programs:renderPrograms,classes:renderClasses}[v])(); }

/* ---- Overview ---- */
async function renderOverview(){
  const s=SUMMARY;
  let prog=null; try{ prog=await api("/programs/summary"); }catch(e){}
  const progCard = (prog&&prog.available)
    ? `<div class="card"><div class="n">${prog.programs.length}</div><div class="k">transcriptional programs</div></div>`
    : `<div class="card"><div class="n">—</div><div class="k">transcriptional programs</div></div>`;
  $("#v-overview").innerHTML=`
    <div class="cards">
      <div class="card"><div class="n">${s.n_regulators.toLocaleString()}</div><div class="k">ranked regulators</div></div>
      <div class="card"><div class="n">${fmt(s.n_global)}</div><div class="k">global</div></div>
      <div class="card"><div class="n">${fmt(s.n_context_specific)}</div><div class="k">context-specific</div></div>
      ${progCard}
      <div class="card"><div class="n">${s.edges_available?"yes":"no"}</div><div class="k">effect network (PoC)</div></div>
    </div>
    <div class="panel"><div class="sec">Top robust regulators</div>
      <div id="ov-top" class="muted">loading…</div></div>
    <p class="lead" style="margin-top:14px">This atlas turns a 1.8&nbsp;TB CD4 Perturb-seq screen into three explorable objects — <b>robust regulators</b>, <b>reproducibility audits</b>, and <b>transcriptional programs</b>. The pipeline (<span class="mono">make all</span>) produces the artifacts; this API makes them explorable.</p>`;
  const list=await api("/regulators?limit=10");
  $("#ov-top").innerHTML=regTable(list);
  wireRows($("#ov-top"));
}

/* ---- Explorer ---- */
async function renderExplorer(){
  $("#v-explorer").innerHTML=`
    <div class="panel">
      <div class="search"><input id="q" placeholder="search a gene (e.g. SGF29, ZAP70)…" autocomplete="off">
        <button id="go">View profile</button></div>
      <div class="filters">
        <select id="fclass"><option value="">all classes</option><option value="global">global</option><option value="condition-specific">context-specific</option></select>
        <select id="fsort"><option value="core_rank">sort: EB rank</option><option value="stability_frequency">stability</option><option value="reweighted_score">reproducibility</option></select>
      </div>
      <div id="reglist" class="muted">loading…</div>
    </div>
    <div id="profile"></div>`;
  const load=async()=>{const c=$("#fclass").value,so=$("#fsort").value;
    const list=await api(`/regulators?limit=25${c?`&regulator_class=${c}`:""}&sort_by=${so}`);
    $("#reglist").innerHTML=regTable(list); wireRows($("#reglist"));};
  $("#fclass").onchange=load; $("#fsort").onchange=load;
  $("#go").onclick=()=>showProfile($("#q").value.trim());
  $("#q").addEventListener("keydown",e=>{if(e.key==="Enter")showProfile($("#q").value.trim());});
  load();
}
async function showProfile(gene){
  if(!gene)return; current="explorer";
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected",x.dataset.view==="explorer"));
  document.querySelectorAll("section[id^=v-]").forEach(s=>s.classList.toggle("hide",s.id!=="v-explorer"));
  if(!$("#profile")){await renderExplorer();}
  const box=$("#profile"); box.innerHTML=`<div class="panel muted">loading ${gene}…</div>`;
  let p; try{ p=await api("/regulators/"+encodeURIComponent(gene.toUpperCase())); }
  catch(e){
    await loadGenes(); const sug=suggest(gene);
    const sugHtml=sug.length?`<div style="margin-top:10px">Did you mean: ${sug.map(g=>`<span class="chip sug" data-gene="${g}" style="cursor:pointer;border-color:var(--accent);color:var(--accent)">${g}</span>`).join(" ")}</div>`:"";
    box.innerHTML=`<div class="panel err"><b>${gene}</b> not found.${sugHtml}</div>`;
    box.querySelectorAll(".sug").forEach(s=>s.addEventListener("click",()=>{$("#q").value=s.dataset.gene;showProfile(s.dataset.gene);}));
    return; }
  const cond=p.condition_profile||{}; const mx=Math.max(1,...Object.values(cond));
  const order=["Rest","Stim8hr","Stim48hr"];
  const condBars=order.filter(c=>c in cond).map(c=>`<div class="barrow"><span class="muted">${c}</span>
    <div class="track"><div class="fill" style="width:${(cond[c]/mx*100).toFixed(0)}%"></div></div><span>${cond[c].toLocaleString()}</span></div>`).join("")||`<span class="muted">no per-condition profile</span>`;
  const edges=(p.top_downstream_edges||[]).map(e=>`<tr><td class="gn">${e.measured_gene}</td>
    <td class="${e.direction}">${e.direction==="up"?"↑":"↓"} ${e.log_fc}</td>
    <td class="num">${e.p_abs_effect_gt_1p5x}</td><td class="muted">${e.condition}</td></tr>`).join("");
  const stt=p.audit_status; const sttc=stt==="demoted"?"dem":stt==="promoted"?"pro":"sur";
  const labeled=p.program_label&&p.program_label!=="mixed";
  const progChip=labeled?`<span class="chip" style="border-color:var(--violet);color:var(--violet)">${p.program_label}</span>`:"";
  const progHtml=p.in_program_panel?`
    <div class="sec" style="margin-top:20px">Transcriptional program</div>
    <p class="lead" style="margin:0 0 8px">${labeled
      ? `Assigned to the <b>${p.program_label}</b> program by fingerprint similarity (nearest <b>${p.nearest_complex}</b> centroid, cosine <b>${fmt(p.nearest_complex_cosine)}</b>) — a program-level hypothesis, not a complex-membership claim.`
      : `In the fingerprint panel but <b>unassigned</b> (mixed) — nearest complex ${p.nearest_complex} at cosine ${fmt(p.nearest_complex_cosine)} (below the labeling threshold).`}</p>
    ${(p.transcriptomic_neighbors||[]).length?`<div style="margin-bottom:8px"><span class="muted" style="font-size:12px">transcriptomic neighbors · </span>${p.transcriptomic_neighbors.map(n=>`<span class="chip pgnb" data-gene="${n.neighbor}" style="cursor:pointer"><b>${n.neighbor}</b> ${n.similarity.toFixed(2)}</span>`).join(" ")}</div>`:""}
    ${(p.program_markers||[]).length?`<div><span class="muted" style="font-size:12px">program response genes · </span>${p.program_markers.map(m=>`<span class="chip">${m.gene}${m.direction==="up"?" ↑":" ↓"}</span>`).join(" ")}</div>`:""}`:"";
  box.innerHTML=`<div class="panel">
    <div class="prof-head"><h2>${p.gene}</h2>
      <span class="rk">EB #${p.core_rank}</span>
      ${p.regulator_class?`<span class="cls ${p.regulator_class==="global"?"global":"cs"}">${p.regulator_class}</span>`:""}
      ${progChip}
      ${stt?`<span class="stt ${sttc}">${stt}</span>`:""}</div>
    <p class="interp">${p.interpretation}</p>
    <div class="kv">
      <div class="b"><div class="v">${fmt(p.regpower_eb_mean)}</div><div class="l">EB regulatory power</div></div>
      <div class="b"><div class="v">${pct(p.stability_frequency)}</div><div class="l">stability (bootstrap)</div></div>
      <div class="b"><div class="v">${p.kd_significant_conditions??"—"}/3</div><div class="l">conditions with sig. KD</div></div>
      <div class="b"><div class="v">${fmt(p.condition_specificity)}</div><div class="l">condition specificity</div></div>
      <div class="b"><div class="v">${fmt(p.guide_corr)}</div><div class="l">cross-guide repro.</div></div>
      <div class="b"><div class="v">${fmt(p.donor_corr)}</div><div class="l">cross-donor repro.</div></div>
    </div>
    <div class="sec" style="margin-top:20px">Per-condition profile (n_downstream)</div>${condBars}
    ${edges?`<div class="sec" style="margin-top:20px">Top downstream edges (bonus)</div>
      <table><thead><tr><th>gene</th><th>effect (log₂FC)</th><th class="num">P(&gt;1.5×)</th><th>cond.</th></tr></thead><tbody>${edges}</tbody></table>`:""}
    ${progHtml}
  </div>`;
  box.querySelectorAll(".pgnb").forEach(c=>c.addEventListener("click",()=>showProfile(c.dataset.gene)));
}

/* ---- Audit ---- */
async function renderAudit(){
  $("#v-audit").innerHTML=`<div class="panel"><div class="sec">Reproducibility audit</div><div id="au" class="muted">loading…</div></div>`;
  const d=await api("/audit/reproducibility");
  if(!d.available){$("#au").innerHTML=`<span class="muted">Not available (run <span class="mono">make repro-meta</span>).</span>`;return;}
  const c=d.coverage||{};
  const rows=d.rows.map(r=>{const sc=r.status==="demoted"?"dem":r.status==="promoted"?"pro":"sur";
    return `<tr><td class="gn">${r.gene}</td><td class="num">${r.old_rank}→${r.new_rank}</td>
      <td><span class="stt ${sc}">${r.status}</span></td><td class="num">${fmt(r.guide_corr)}</td>
      <td class="num">${fmt(r.donor_corr)}</td><td class="muted" style="font-size:11px">${r.reason||""}</td></tr>`;}).join("");
  $("#au").innerHTML=`<p class="lead"><b>Sensitivity</b> analysis (not a new model): we reweight the EB score with real reproducibility. Cross-guide coverage <b>${c.pct_guide_corr_available??"?"}%</b>, cross-donor <b>${c.pct_donor_corr_available??"?"}%</b> (partial → neutral weight).</p>
    <table><thead><tr><th>gene</th><th class="num">rank</th><th>status</th><th class="num">guide</th><th class="num">donor</th><th>reason</th></tr></thead><tbody>${rows}</tbody></table>`;
}

/* ---- Edges ---- */
async function renderEdges(){
  $("#v-edges").innerHTML=`<div class="panel"><div class="sec">Uncertainty-aware effect network · proof-of-concept</div><div id="ed" class="muted">loading…</div></div>`;
  const sum=await api("/edges/summary"); const dn=await api("/edges/downstream?limit=12");
  if(!sum.available){$("#ed").innerHTML=`<span class="muted">Not available (run <span class="mono">make edges</span> + <span class="mono">make eda-edges</span>).</span>`;return;}
  const byreg={}; sum.rows.forEach(r=>{byreg[r.perturbed_gene]=(byreg[r.perturbed_gene]||{p:0,n:0});byreg[r.perturbed_gene].p+=r.n_positive;byreg[r.perturbed_gene].n+=r.n_negative;});
  const reg=Object.entries(byreg).sort((a,b)=>(b[1].p+b[1].n)-(a[1].p+a[1].n));
  const mx=Math.max(...reg.map(r=>r[1].p+r[1].n));
  const regRows=reg.map(([g,v])=>`<div class="barrow"><span class="gn">${g}</span>
    <div class="track" style="background:transparent"><div style="display:flex;height:14px;border-radius:5px;overflow:hidden;width:${((v.p+v.n)/mx*100).toFixed(0)}%">
    <div style="background:var(--up);width:${(v.p/(v.p+v.n)*100).toFixed(0)}%"></div><div style="background:var(--down);flex:1"></div></div></div>
    <span>${v.p+v.n}</span></div>`).join("");
  const conv=dn.rows.map(r=>`<span class="chip"><b>${r.measured_gene}</b> · ${r.n_upstream_regulators}/6</span>`).join(" ");
  $("#ed").innerHTML=`<p class="lead">2,470 edges from 6 SAGA-complex regulators. <span class="mono">P(|effect|&gt;1.5×)</span>, not P(causal edge). Minimal coverage → <b>bonus</b>.</p>
    <div class="sec" style="margin-top:6px">Edges per regulator <span class="up">↑</span>/<span class="down">↓</span></div>${regRows}
    <div class="sec" style="margin-top:18px">Convergent targets</div><div style="display:flex;flex-wrap:wrap;gap:6px">${conv}</div>`;
}

/* ---- Programs (transcriptional programs) ---- */
const CPLX={SAGA:["TADA1","TADA2A","TADA2B","TADA3","SUPT20H","SGF29","TAF6L","TAF5L","USP22","ENY2","ATXN7L3","KAT2A"],
  Mediator:["MED12","MED13","MED14","MED23","MED24","CCNC","CDK8"],
  TCR:["ZAP70","LCK","LAT","LCP2","VAV1","ITK","CARD11","PLCG1"]};
const cplxOf=g=>Object.keys(CPLX).find(k=>CPLX[k].includes(g));
const COLBY={program_label:{"SAGA/chromatin":"#d6412f","Mediator/transcription":"#2f5ed0","TCR signaling":"#37b24d",mixed:"#9aa3b2"},
  regulator_class:{global:"#4c8bf5","condition-specific":"#37b24d",NA:"#888"},
  source:{global:"#4c8bf5","context-specific":"#37b24d",promoted:"#9775fa",demoted:"#b08968"},
  condition:{Rest:"#888",Stim8hr:"#f59f00",Stim48hr:"#e03131"}};
let PCA_PTS=null;
async function renderPrograms(){
  $("#v-programs").innerHTML=`<div class="panel"><div class="sec">Transcriptional programs</div><div id="pg" class="muted">loading…</div></div>`;
  let d; try{ d=await api("/programs/pca"); }catch(e){ d={available:false}; }
  if(!d||!d.available){$("#pg").innerHTML=`<span class="muted">Not available (run <span class="mono">make fingerprints</span>).</span>`;return;}
  let sm=null; try{ sm=await api("/programs/summary"); }catch(e){}
  PCA_PTS=d.points;
  const cv=(sm&&sm.complex_validation)||[];
  const zline=cv.filter(c=>c.z!=null).map(c=>`${c.complex} z=${c.z}`).join(" · ");
  $("#pg").innerHTML=`<p class="lead">Fingerprint <b>similarity</b> organizes top perturbations into <b>recognizable programs</b>. Each regulator's fingerprint (its downstream zscore vector) is matched to the curated SAGA / Mediator / TCR complexes; above threshold it's assigned, the rest stay <i>mixed</i> (only 25/200 assigned — conservative). These are <b>candidate program assignments by fingerprint similarity, not complex-membership claims</b>. Permutation validation: <b>${zline||"—"}</b>. The PCA is a view — the evidence is nearest-neighbor recovery + these z-scores + program markers.</p>
    <div class="filters"><label class="muted">color by</label>
      <select id="colby"><option value="program_label">program</option><option value="regulator_class">class</option><option value="source">panel source</option><option value="condition">condition</option></select>
      <span id="leg" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center"></span></div>
    <div id="scatter" style="margin-top:6px"></div>
    <div class="search" style="margin-top:14px"><input id="nq" placeholder="regulators similar to… (e.g. SGF29, ZAP70)" autocomplete="off"><button id="ngo">Find neighbors</button></div>
    <div id="neighbors"></div>`;
  const draw=()=>drawScatter($("#colby").value);
  $("#colby").onchange=draw; draw();
  $("#ngo").onclick=()=>showNeighbors($("#nq").value.trim());
  $("#nq").addEventListener("keydown",e=>{if(e.key==="Enter")showNeighbors($("#nq").value.trim());});
}
function drawScatter(colby){
  const P=PCA_PTS, W=760,H=520,pad=34;
  const xs=P.map(p=>p.PC1),ys=P.map(p=>p.PC2);
  const xmn=Math.min(...xs),xmx=Math.max(...xs),ymn=Math.min(...ys),ymx=Math.max(...ys);
  const sx=v=>pad+(v-xmn)/(xmx-xmn)*(W-2*pad), sy=v=>H-pad-(v-ymn)/(ymx-ymn)*(H-2*pad);
  const pal=COLBY[colby];
  const dots=P.map(p=>{const c=pal[p[colby]]||"#888",cx=sx(p.PC1),cy=sy(p.PC2),k=cplxOf(p.gene);
    return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${k?5.5:4}" fill="${c}" fill-opacity="0.8"
      ${k?`stroke="#111" stroke-width="1.4"`:``}><title>${p.gene} · ${p.condition} · ${p.source}</title></circle>`
    +(k?`<text x="${(cx+6).toFixed(1)}" y="${(cy+3).toFixed(1)}" font-size="9" fill="var(--text)">${p.gene}</text>`:``);}).join("");
  $("#scatter").innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;background:var(--panel2);border:1px solid var(--line2);border-radius:10px">
    <text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--muted)">PC1</text>
    <text x="14" y="${H/2}" text-anchor="middle" font-size="11" fill="var(--muted)" transform="rotate(-90 14 ${H/2})">PC2</text>${dots}</svg>`;
  $("#leg").innerHTML=Object.entries(pal).map(([k,c])=>`<span class="chip"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c};margin-right:5px"></span>${k}</span>`).join("");
}
async function showNeighbors(gene){
  if(!gene)return; const box=$("#neighbors"); const g=gene.toUpperCase();
  box.innerHTML=`<div class="panel muted">finding neighbors of ${g}…</div>`;
  let d; try{ d=await api("/programs/neighbors/"+encodeURIComponent(g)); }catch(e){ d={in_panel:false}; }
  if(!d.in_panel){box.innerHTML=`<div class="panel muted"><b>${g}</b> is not in the fingerprint panel (200 balanced regulators). Try SGF29, ZAP70, MED12…</div>`;return;}
  const chips=d.neighbors.map(n=>`<span class="chip" data-gene="${n.neighbor}" style="cursor:pointer">
    <b>${n.neighbor}</b> · ${n.similarity.toFixed(2)} <span class="muted">${n.neighbor_condition}</span></span>`).join(" ");
  box.innerHTML=`<div class="panel"><div class="sec">Regulators transcriptomically similar to ${g}</div>
    <p class="muted" style="margin:2px 0 10px">Neighbors by fingerprint cosine similarity. Click → profile.</p>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${chips}</div></div>`;
  box.querySelectorAll(".chip[data-gene]").forEach(c=>c.addEventListener("click",()=>showProfile(c.dataset.gene)));
}

/* ---- Programs by class (balanced 30-regulator panel) ---- */
const CLSCOL={"SAGA/chromatin":"#9585e0","Mediator":"#4c8bf5","TCR (context-specific)":"#37b24d",
  "Other robust":"#8b95a8","Repro-promoted":"#e0a441","Demoted control":"#5d6779"};
const CLSSHORT={"SAGA/chromatin":"SAGA","Mediator":"Mediator","TCR (context-specific)":"TCR",
  "Other robust":"Other","Repro-promoted":"Promoted","Demoted control":"Demoted"};
function sigStars(p){ return p==null?"":(p<1e-10?"***":p<1e-4?"**":p<0.05?"*":"ns"); }
async function renderClasses(){
  $("#v-classes").innerHTML=`<div class="panel"><div class="sec">Do different regulator classes converge on different programs?</div><div id="cp" class="muted">loading…</div></div>`;
  let d; try{ d=await api("/programs/classes"); }catch(e){ d={available:false}; }
  if(!d||!d.available){$("#cp").innerHTML=`<span class="muted">Not available (run <span class="mono">make class-programs</span>).</span>`;return;}
  const jm=d.jaccard_offdiag_median;
  const cards=d.classes.map(c=>{
    const col=CLSCOL[c.regulator_class]||"#888";
    const foldTxt=c.isg_fold_enrichment==null?"—":c.isg_fold_enrichment.toFixed(1)+"×";
    return `<div class="card clscard" data-cls="${c.regulator_class}" style="cursor:pointer;border-left:3px solid ${col}">
      <div class="n" style="color:${col}">${foldTxt}</div>
      <div class="k"><b>${CLSSHORT[c.regulator_class]||c.regulator_class}</b> · ISG ${sigStars(c.isg_p_value)}</div>
      <div class="k" style="margin-top:4px">${c.n_regulators} reg · ${c.n_convergent_targets} targets</div>
      <div class="k muted" style="margin-top:3px;font-size:11px">${c.dominant_program||""}</div></div>`;}).join("");
  $("#cp").innerHTML=`<p class="lead"><b>${d.answer}</b></p>
    <p class="muted" style="margin:2px 0 12px;font-size:12.5px">Balanced panel of <b>30 regulators</b> chosen by class (not by rank) · <b>${(d.n_edges_total||0).toLocaleString()}</b> robust edges · median off-diagonal Jaccard <b>${jm==null?"—":jm.toFixed(2)}</b> (low overlap = distinct programs). Offline (<span class="mono">make class-programs</span>). These are candidate convergent-target programs, not causal pathways.</p>
    <div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">${cards}</div>
    <div class="sec" style="margin-top:20px">Overlap between classes (Jaccard of target sets)</div>
    <div id="jac"></div>
    <div class="sec" style="margin-top:22px">Condition dependence · stimulation-gated vs constitutive (phase-2)</div>
    <div id="ph2" class="muted" style="font-size:12.5px">loading…</div>
    <div id="cltargets" style="margin-top:8px"></div>`;
  drawJaccard(d.jaccard);
  loadPhase2();
  $("#cp").querySelectorAll(".clscard").forEach(el=>el.addEventListener("click",()=>showClassTargets(el.dataset.cls)));
}
let PHASE2=null, PH2_COND=null;
async function loadPhase2(){
  try{ PHASE2=await api("/programs/phase2"); }catch(e){ PHASE2={available:false}; }
  if(!PHASE2||!PHASE2.available){ $("#ph2").innerHTML=`<span class="muted">Not available (run <span class="mono">make class-programs</span>).</span>`; return; }
  PH2_COND=PHASE2.conditions.includes("Stim8hr")?"Stim8hr":PHASE2.conditions[0];
  const rr=PHASE2.stim_vs_rest_ratio||{};
  const ratioTxt=Object.keys(PHASE2.by_class_isg_fold||{}).map(c=>`${CLSSHORT[c]||c} ${rr[c]==null?"—":rr[c].toFixed(1)+"×"}`).join(" · ");
  $("#ph2").innerHTML=`<p class="muted" style="margin:0 0 8px">Same 10 regulators (3 classes) tracked across the 3 culture conditions. Toggle a condition to see the interferon (ISG) fold-enrichment per class.</p>
    <div class="filters" id="ph2toggle" style="margin-bottom:8px">${PHASE2.conditions.map(c=>`<button class="tab" data-cond="${c}" style="font-size:12px;padding:5px 12px">${c}</button>`).join("")}</div>
    <div id="ph2bars"></div>
    <p class="muted" style="margin:10px 0 0;font-size:12px">Downstream breadth (Stim/Rest ratio): <b>${ratioTxt}</b> — TCR programs are <b>stimulation-gated</b> (~4×), chromatin/Mediator largely <b>constitutive</b> (~1×). The interferon program peaks under stimulation in every class.</p>`;
  $("#ph2toggle").querySelectorAll("[data-cond]").forEach(b=>b.addEventListener("click",()=>drawPhase2(b.dataset.cond)));
  drawPhase2(PH2_COND);
}
function drawPhase2(cond){
  PH2_COND=cond;
  $("#ph2toggle").querySelectorAll("[data-cond]").forEach(b=>b.setAttribute("aria-selected", b.dataset.cond===cond));
  const bc=PHASE2.by_class_isg_fold||{};
  const rows=Object.entries(bc).map(([c,byc])=>[c, byc[cond]==null?0:byc[cond]]).sort((a,b)=>b[1]-a[1]);
  const mx=Math.max(1,...rows.map(r=>r[1]));
  $("#ph2bars").innerHTML=rows.map(([c,v])=>{
    const col=CLSCOL[c]||"#888";
    return `<div class="barrow" style="grid-template-columns:96px 1fr auto"><span style="color:${col};font-weight:600">${CLSSHORT[c]||c}</span>
      <div class="track"><div class="fill" style="width:${(v/mx*100).toFixed(0)}%;background:${col}"></div></div>
      <span class="mono">${v.toFixed(1)}× ISG</span></div>`;}).join("");
}
function drawJaccard(J){
  if(!J){ $("#jac").innerHTML=`<span class="muted">—</span>`; return; }
  const cls=J.classes, n=cls.length, cell=52, lab=78, W=lab+n*cell+10, H=lab+n*cell+10;
  const col=v=>{const t=Math.min(1,v/0.3); const r=Math.round(18+t*(34-18)),g=Math.round(22+t*(184-22)),b=Math.round(31+t*(196-31));return `rgb(${r},${g},${b})`;};
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px">`;
  for(let i=0;i<n;i++){
    svg+=`<text x="${lab-6}" y="${lab+i*cell+cell/2+3}" text-anchor="end" font-size="10" fill="var(--muted)">${CLSSHORT[cls[i]]||cls[i]}</text>`;
    svg+=`<text x="${lab+i*cell+cell/2}" y="${lab-6}" text-anchor="start" font-size="10" fill="var(--muted)" transform="rotate(-45 ${lab+i*cell+cell/2} ${lab-6})">${CLSSHORT[cls[i]]||cls[i]}</text>`;
    for(let j=0;j<n;j++){const v=J.matrix[i][j],x=lab+j*cell,y=lab+i*cell;
      svg+=`<rect x="${x}" y="${y}" width="${cell-2}" height="${cell-2}" rx="4" fill="${col(v)}"><title>${cls[i]} ∩ ${cls[j]} = ${v.toFixed(2)}</title></rect>
        <text x="${x+cell/2-1}" y="${y+cell/2+3}" text-anchor="middle" font-size="10" fill="${v>0.15?'#fff':'#8b95a8'}" font-family="var(--mono)">${v.toFixed(2)}</text>`;}
  }
  $("#jac").innerHTML=svg+`</svg>`;
}
async function showClassTargets(cls){
  const box=$("#cltargets"); box.innerHTML=`<div class="panel muted">loading targets for ${cls}…</div>`;
  let d; try{ d=await api("/programs/class-targets?class="+encodeURIComponent(cls)); }catch(e){ d={available:false}; }
  if(!d.available){box.innerHTML=`<div class="panel muted">No target list for <b>${cls}</b>.</div>`;return;}
  const isg=d.targets.filter(t=>t.is_ISG).map(t=>`<span class="chip" style="border-color:var(--up);color:var(--up)"><b>${t.target_gene}</b></span>`).join(" ");
  const rest=d.targets.filter(t=>!t.is_ISG).slice(0,60).map(t=>`<span class="chip">${t.target_gene}</span>`).join(" ");
  box.innerHTML=`<div class="panel"><div class="sec">${cls} · ${d.n_targets} convergent targets (${d.n_isg} ISG)</div>
    ${isg?`<p class="muted" style="margin:2px 0 6px;font-size:12px">Interferon-stimulated genes (ISGs):</p><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${isg}</div>`:""}
    <p class="muted" style="margin:2px 0 6px;font-size:12px">Other targets${d.targets.length-d.n_isg>60?" (first 60)":""}:</p>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${rest||'<span class="muted">—</span>'}</div></div>`;
}

/* helpers */
function regTable(list){
  return `<table><thead><tr><th>gene</th><th class="num">rank</th><th>class</th>
      <th class="num" title="empirical-Bayes regulatory power (log-rate)">Reg. power</th>
      <th class="num" title="selection frequency in the top-30 (bootstrap B=200)">stab.</th>
      <th class="num" title="cross-guide correlation (reproducibility between the 2 guides)">guide</th>
      <th class="num" title="cross-donor correlation (reproducibility across donors)">donor</th></tr></thead><tbody>${
    list.map(r=>`<tr data-gene="${r.gene}"><td class="gn">${r.gene}</td><td class="num">${r.core_rank}</td>
      <td>${r.regulator_class?`<span class="cls ${r.regulator_class==="global"?"global":"cs"}">${r.regulator_class}</span>`:"—"}</td>
      <td class="num">${fmt(r.regpower_eb_mean)}</td><td class="num">${pct(r.stability_frequency)}</td>
      <td class="num">${corr(r.guide_corr)}</td><td class="num">${corr(r.donor_corr)}</td></tr>`).join("")}</tbody></table>
    <div class="muted" style="font-size:11px;margin-top:8px;font-family:var(--mono)">Reg. power = EB regulatory power · <b>—</b> in guide/donor = no metadata (neutral weight, no penalty)</div>`;
}
function wireRows(container){ container.querySelectorAll("tr[data-gene]").forEach(tr=>tr.addEventListener("click",()=>showProfile(tr.dataset.gene))); }

connect();
</script>
